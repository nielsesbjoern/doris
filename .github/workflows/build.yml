name: Build

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          python3 scripts/test_seo.py
          python3 scripts/test_site.py
          python3 scripts/check_links.py

      - name: Run full build
        run: python3 scripts/build.py

      - name: Verify generated output is committed
        run: |
          git diff --exit-code || (
            echo "::error::Build produced uncommitted changes. Run 'python3 scripts/build.py' locally and commit."
            git diff --stat
            exit 1
          )

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build site
        run: python3 scripts/build.py

      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.14.0 autorun
